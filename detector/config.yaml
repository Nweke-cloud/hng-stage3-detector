slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: "#alerts"

log:
  path: "/var/log/nginx/hng-access.log"
  audit_path: "/var/log/detector/audit.log"

detection:
  window_seconds: 60
  baseline_window_minutes: 30
  baseline_recalc_interval: 60
  zscore_threshold: 3.0
  rate_multiplier_threshold: 5.0
  error_rate_multiplier: 3.0
  min_requests_for_baseline: 10
  whitelist:
    - "127.0.0.1"
    - "23.22.241.56"
    - "172.18.0.0/16"
    - "172.17.0.0/16"

unban:
  schedule_minutes: [10, 30, 120]

dashboard:
  port: 5000
  refresh_seconds: 3
